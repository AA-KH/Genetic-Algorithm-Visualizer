<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenSim — Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #060810;
    --text: #dce8f5;
    --grid-color: rgba(56, 189, 248, 0.03);
    --accent: #38bdf8;
    --accent-soft: rgba(56, 189, 248, 0.2);
    --accent-mid: rgba(56, 189, 248, 0.45);
    --accent-strong: rgba(56, 189, 248, 0.7);
    --bar-bg: rgba(56, 189, 248, 0.1);
    --bar-gradient-start: rgba(56, 189, 248, 0.4);
  }

  [data-theme="light"] {
    --bg: #f2ede6;
    --text: #2a1f10;
    --grid-color: rgba(176, 106, 16, 0.05);
    --accent: #b06a10;
    --accent-soft: rgba(176, 106, 16, 0.2);
    --accent-mid: rgba(176, 106, 16, 0.45);
    --accent-strong: rgba(176, 106, 16, 0.7);
    --bar-bg: rgba(176, 106, 16, 0.12);
    --bar-gradient-start: rgba(176, 106, 16, 0.35);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 44px;
    overflow: hidden;
  }

  body.fade-out {
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  #brand {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.18em;
    animation: fade-in 0.6s ease forwards;
  }

  #spinner-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    animation: fade-in 0.6s ease forwards 0.3s;
    opacity: 0;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
  }

  .ring-outer {
    border-top-color: var(--accent);
    border-right-color: var(--accent-soft);
    animation: spin 1.4s linear infinite;
  }

  .ring-mid {
    inset: 14px;
    border-bottom-color: var(--accent-mid);
    border-left-color: var(--accent-mid);
    animation: spin 2s linear infinite reverse;
  }

  .ring-inner {
    inset: 30px;
    border-top-color: var(--accent-strong);
    animation: spin 0.9s linear infinite;
  }

  .core {
    position: absolute;
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: core-pulse 1.8s ease-in-out infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes core-pulse {
    0%, 100% { box-shadow: 0 0 10px var(--accent), 0 0 24px var(--accent-soft); }
    50%       { box-shadow: 0 0 18px var(--accent), 0 0 44px var(--accent-mid); }
  }

  @keyframes fade-in {
    to { opacity: 1; }
  }

  #status-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 320px;
    opacity: 0;
    animation: fade-in 0.5s ease forwards 0.7s;
  }

  #stage-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.07em;
    text-align: center;
    height: 1.4em;
    overflow: hidden;
  }

  #stage-text span {
    display: block;
    animation: text-slide 0.4s ease forwards;
  }

  @keyframes text-slide {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #progress-bar-wrap {
    width: 100%;
    height: 2px;
    background: var(--bar-bg);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--bar-gradient-start), var(--accent));
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
</style>
</head>
<body>

<span id="brand">GENSIM // v0.1</span>

<div id="spinner-wrap">
  <div class="ring ring-outer"></div>
  <div class="ring ring-mid"></div>
  <div class="ring ring-inner"></div>
  <div class="core"></div>
</div>

<div id="status-block">
  <div id="stage-text"><span id="stage-label">Initializing simulation environment...</span></div>
  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>
</div>

<script>
  const savedTheme = localStorage.getItem('ga-visualizer-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);

  const stages = [
    { text: 'Initializing simulation environment...', progress: 0 },
    { text: 'Generating initial population...', progress: 20 },
    { text: 'Encoding organism structures...', progress: 40 },
    { text: 'Calibrating mutation parameters...', progress: 60 },
    { text: 'Preparing evolutionary cycle...', progress: 80 },
    { text: 'Simulation ready.', progress: 100 },
  ];

  const label = document.getElementById('stage-label');
  const bar = document.getElementById('progress-bar');
  const delays = [0, 1400, 2800, 4200, 5600, 7000];

  stages.forEach(function(stage, i) {
    setTimeout(function() {
      label.style.animation = 'none';
      label.offsetHeight;
      label.style.animation = '';
      label.textContent = stage.text;
      bar.style.width = stage.progress + '%';
    }, delays[i]);
  });

  setTimeout(function() {
    document.body.classList.add('fade-out');

    setTimeout(function() {
      window.location.href = '../simulation/index.html';
    }, 250);
  }, 7600);
</script>

</body>
</html>
