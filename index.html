<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenSim — Genetic Algorithm Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="field"></div>

<div id="top-bar">
  <div id="top-bar-left">
    <span id="brand">GENSIM // v0.1</span>
    <div class="status-pill">
      <span class="status-dot"></span>
      SIMULATION READY
    </div>
  </div>
  <div id="top-bar-right">
    <span id="theme-status">DARK MODE</span>
    <div id="theme-toggle" title="Toggle light/dark mode"></div>
  </div>
</div>

<div id="panel-toggle">›</div>

<div id="control-panel">
  <div class="panel-label">Control Panel</div>

  <div class="param-block">
    <div class="param-header">
      <span class="param-name">Population Size</span>
      <span class="param-value" id="val-pop">40</span>
    </div>
    <input type="range" id="sl-pop" min="10" max="200" value="40">
  </div>

  <div class="param-block">
    <div class="param-header">
      <span class="param-name">Mutation Rate</span>
      <span class="param-value" id="val-mut">0.05</span>
    </div>
    <input type="range" id="sl-mut" min="0" max="100" value="5">
  </div>

  <div class="param-block">
    <div class="param-header">
      <span class="param-name">Generation Length</span>
      <span class="param-value" id="val-gen">200</span>
    </div>
    <input type="range" id="sl-gen" min="50" max="500" value="200">
  </div>

  <div class="param-block">
    <div class="param-header">
      <span class="param-name">Selection Pressure</span>
      <span class="param-value" id="val-sel">0.60</span>
    </div>
    <input type="range" id="sl-sel" min="10" max="100" value="60">
  </div>

  <hr class="panel-divider">

  <div class="panel-status">
    <span class="status-dot"></span>
    <span id="panel-state-text">PANEL OPEN</span>
  </div>
</div>

<div id="stats-panel">
  <div class="stats-label">
    <span class="status-dot"></span>
    Live Readout
  </div>
  <div class="stat-row">
    <span class="stat-name">Population</span>
    <span class="stat-val">40</span>
  </div>
  <div class="stat-row">
    <span class="stat-name">Best Fitness</span>
    <span class="stat-val">—</span>
  </div>
  <div class="stat-row">
    <span class="stat-name">Generation</span>
    <span class="stat-val">0</span>
  </div>
</div>

<div id="field-status">CLICK FIELD TO REPOSITION GOAL &nbsp;·&nbsp; GOAL ACTIVE</div>

<div id="goal">
  <span id="goal-label">TARGET</span>
  <div class="goal-ring goal-ring-outer"></div>
  <div class="goal-ring goal-ring-mid"></div>
  <div class="goal-core"></div>
  <span id="goal-coords"></span>
</div>

<script src="script.js"></script>
</body>
</html>
